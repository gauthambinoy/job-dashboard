services:
  # ────────────────────────────────────────────
  # PostgreSQL Database
  # ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lazyscaper_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-lazyscaper}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-lazyscaper}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lazyscaper_network
    security_opt:
      - no-new-privileges:true

  # ────────────────────────────────────────────
  # Express / TypeScript Backend
  # ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lazyscaper_api
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-5000}:5000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-lazyscaper}
      API_PORT:     5000
      NODE_ENV:     ${NODE_ENV:-production}
      JWT_SECRET:   ${JWT_SECRET:-change-this-insecure-default-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      INDEED_API_KEY:   ${INDEED_API_KEY:-}
      LINKEDIN_API_KEY: ${LINKEDIN_API_KEY:-}
      ADZUNA_APP_ID:    ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY:   ${ADZUNA_APP_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lazyscaper_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true

  # ────────────────────────────────────────────
  # Next.js Frontend
  # ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
    container_name: lazyscaper_web
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL:    ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
      NODE_ENV:               ${NODE_ENV:-production}
      NEXT_TELEMETRY_DISABLED: 1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lazyscaper_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local

networks:
  lazyscaper_network:
    driver: bridge
